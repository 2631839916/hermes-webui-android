<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes WebUI App 预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #6c63ff; }
        .preview { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .phone { 
            background: #0f0f23;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .screen { 
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
            border-radius: 20px;
            padding: 15px;
            min-height: 500px;
        }
        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            padding: 5px 10px;
            font-size: 12px;
            color: #888;
        }
        .header {
            background: linear-gradient(90deg, #6c63ff 0%, #5a52d5 100%);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h2 { font-size: 18px; }
        .chat-area {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            min-height: 300px;
        }
        .message {
            background: rgba(108, 99, 255, 0.2);
            padding: 10px 15px;
            border-radius: 15px;
            margin: 10px 0;
            max-width: 80%;
        }
        .message.user {
            background: rgba(3, 218, 198, 0.2);
            margin-left: auto;
        }
        .input-area {
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .input-area input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .send-btn {
            background: #6c63ff;
            border: none;
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .feature {
            background: rgba(108, 99, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .feature-icon { font-size: 24px; margin-bottom: 5px; }
        .feature-text { font-size: 12px; color: #aaa; }
        .btn {
            display: block;
            background: linear-gradient(90deg, #6c63ff 0%, #5a52d5 100%);
            color: #fff;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-decoration: none;
            font-weight: bold;
        }
        .info {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        .info h3 { color: #6c63ff; margin-bottom: 10px; }
        .info ul { list-style: none; }
        .info li { padding: 5px 0; }
        .info li:before { content: "✓ "; color: #03dac6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Hermes WebUI App</h1>
        
        <div class="preview">
            <!-- 手机预览 -->
            <div class="phone">
                <div class="screen">
                    <div class="status-bar">
                        <span>9:41</span>
                        <span>📶 🔋</span>
                    </div>
                    
                    <div class="header">
                        <span style="font-size: 24px;">🤖</span>
                        <h2>Hermes WebUI</h2>
                    </div>
                    
                    <div class="chat-area">
                        <div class="message">
                            <strong>Hermes:</strong> 你好！我是 Hermes，你的 AI 助手。有什么可以帮助你的吗？
                        </div>
                        <div class="message user">
                            <strong>你:</strong> 帮我写一个 Python 脚本
                        </div>
                        <div class="message">
                            <strong>Hermes:</strong> 好的！这是一个简单的 Python 脚本示例...
                        </div>
                    </div>
                    
                    <div class="input-area">
                        <input type="text" placeholder="输入消息..." />
                        <button class="send-btn">➤</button>
                    </div>
                </div>
            </div>
            
            <!-- 功能介绍 -->
            <div>
                <div class="features">
                    <div class="feature">
                        <div class="feature-icon">💬</div>
                        <div class="feature-text">智能对话</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">📁</div>
                        <div class="feature-text">文件管理</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">💻</div>
                        <div class="feature-text">代码执行</div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🔧</div>
                        <div class="feature-text">工具调用</div>
                    </div>
                </div>
                
                <div class="info">
                    <h3>✨ 功能特点</h3>
                    <ul>
                        <li>完整的 WebView 支持</li>
                        <li>文件上传/下载</li>
                        <li>相机拍照</li>
                        <li>下拉刷新</li>
                        <li>深色主题</li>
                        <li>JavaScript 支持</li>
                        <li>全屏显示</li>
                    </ul>
                </div>
                
                <a href="https://github.com/2631839916/hermes-webui-android/actions" class="btn">
                    📥 下载 APK
                </a>
            </div>
        </div>
    </div>
</body>
</html>
