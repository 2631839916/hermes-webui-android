name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Generate debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkeypair -v -keystore ~/.android/debug.keystore \
          -storepass android -alias androiddebugkey -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Verify APK signing
      run: |
        echo "=== APK 签名验证 ==="
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        
        # 查找 apksigner
        if [ -n "$ANDROID_HOME" ]; then
          # 找到最新的 build-tools 版本
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          if [ -n "$BUILD_TOOLS_DIR" ]; then
            echo "使用 build-tools: $BUILD_TOOLS_DIR"
            $BUILD_TOOLS_DIR/apksigner verify --verbose "$APK_PATH" 2>&1 || true
            echo ""
            echo "=== 签名信息 ==="
            $BUILD_TOOLS_DIR/apksigner verify --print-certs "$APK_PATH" 2>&1 || true
          else
            echo "未找到 build-tools，尝试使用 zipalign 验证..."
            # 回退到检查文件
            file "$APK_PATH"
          fi
        else
          echo "ANDROID_HOME 未设置"
          file "$APK_PATH"
        fi
        
        echo ""
        echo "=== APK 信息 ==="
        ls -la "$APK_PATH"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: hermes-webui-apk
        path: app/build/outputs/apk/debug/*.apk
