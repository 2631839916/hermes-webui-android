name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Generate debug keystore
      run: |
        mkdir -p ~/.android
        keytool -genkeypair -v -keystore ~/.android/debug.keystore \
          -storepass android -alias androiddebugkey -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Verify APK signing
      run: |
        echo "=== APK 签名验证 ==="
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        
        # 使用 apksigner 验证 (AGP 使用 v2/v3 签名)
        apksigner verify --verbose "$APK_PATH" 2>&1 || true
        
        echo ""
        echo "=== APK 信息 ==="
        ls -la "$APK_PATH"
        
        echo ""
        echo "=== 签名信息 ==="
        apksigner verify --print-certs "$APK_PATH" 2>&1 || true
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: hermes-webui-apk
        path: app/build/outputs/apk/debug/*.apk
