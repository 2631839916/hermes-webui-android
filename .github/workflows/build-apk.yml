name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Sign APK with apksigner
      run: |
        # 生成 debug keystore
        keytool -genkeypair -v -keystore debug.keystore           -storepass android -alias androiddebugkey -keypass android           -keyalg RSA -keysize 2048 -validity 10000           -dname "CN=Android Debug,O=Android,C=US"
        
        # 找到 apksigner
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -1)
        ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" | sort -V | tail -1)
        
        echo "Using apksigner: $APKSIGNER"
        echo "Using zipalign: $ZIPALIGN"
        
        # zipalign
        $ZIPALIGN -v -p 4 app/build/outputs/apk/debug/app-debug.apk app-aligned.apk
        
        # 签名 (v1 + v2)
        $APKSIGNER sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android           --ks-key-alias androiddebugkey --v1-signing-enabled true           app-aligned.apk
        
        # 验证
        $APKSIGNER verify --verbose app-aligned.apk
        
        # 覆盖原文件
        mv app-aligned.apk app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: hermes-webui-apk
        path: app/build/outputs/apk/debug/*.apk
